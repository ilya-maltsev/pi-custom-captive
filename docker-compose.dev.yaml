services:
  app:
    build:
      context: .
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PI_API_URL: https://host.docker.internal:8443
      PI_VERIFY_SSL: "false"
      PI_REALM: defrealm
      DJANGO_SECRET_KEY: dev-secret-key-not-for-production
      DJANGO_DEBUG: "true"
      DJANGO_ALLOWED_HOSTS: "*"
    ports:
      - "6000:8000"
    volumes:
      - .:/app
    command: >
      sh -c "python manage.py runserver 0.0.0.0:8000"
