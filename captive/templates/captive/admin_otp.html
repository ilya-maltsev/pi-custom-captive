{% extends "captive/_base_user.html" %}
{% load i18n %}

{% block title %}{% trans "Admin 2FA" %}{% endblock %}

{% block content %}
<h2>{% trans "Two-factor verification" %}</h2>
<p class="sub">{% blocktrans with u=username %}Enter the TOTP code for <b>{{ u }}</b>.{% endblocktrans %}</p>
<form method="post">
    {% csrf_token %}
    <div class="field">
        <label for="otp">{% trans "6-digit code" %}</label>
        <input type="text" id="otp" name="otp" inputmode="numeric" pattern="[0-9]{6}"
               maxlength="6" autocomplete="one-time-code" autofocus required>
    </div>
    <button type="submit" class="btn btn-primary btn-block">{% trans "Sign in" %}</button>
</form>
{% endblock %}
