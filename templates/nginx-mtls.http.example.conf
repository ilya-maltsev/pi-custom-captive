# ------------------------------------------------------------------------------
# pi-custom-captive — nginx mTLS snippet (http { } scope)
#
# Extract the login name from a named-OID component of the client certificate
# Subject DN. Include this file inside the outer `http { }` block, BEFORE the
# `server { }` that terminates TLS for the captive portal.
#
# Replace the OID below with the one your CA uses for usernames:
#   1.2.643.3.131.1.1   Russian INN (taxpayer id)  — example
#   2.5.4.3             commonName (CN)
#   0.9.2342.19200300.100.1.1  uid (RFC 4519)
#   1.3.6.1.4.1.311.20.2.3     UPN (Microsoft, usually in SAN otherName)
#
# OpenSSL serializes named OIDs in the DN two ways depending on version /
# config. The regex accepts both the dotted form and an `OID.` prefix.
# ------------------------------------------------------------------------------

map $ssl_client_s_dn $captive_mtls_user {
    default "";

    # Example: Russian INN extension. Change to your own OID.
    "~(?:^|,)(?:OID\.)?1\.2\.643\.3\.131\.1\.1=(?<v>[^,]+)"  $v;

    # Example fallback: plain CN.
    # "~(?:^|,)CN=(?<v>[^,]+)"  $v;
}

# Optional shared cache for OCSP responses (see server snippet).
ssl_ocsp_cache shared:captive_ocsp:10m;
