# ------------------------------------------------------------------------------
# pi-custom-captive — nginx mTLS snippet (server + location scope)
#
# Include the directives below inside the `server { listen 443 ssl ... }` block
# that fronts the captive portal. Pair with `nginx-mtls.http.example.conf`
# (which defines `$captive_mtls_user` via a `map` on `$ssl_client_s_dn`).
# ------------------------------------------------------------------------------

# --- Client certificate trust chain -------------------------------------------
ssl_verify_client      on;                                  # or `optional` if you also allow password fallback
ssl_client_certificate /etc/nginx/ssl/user-ca.pem;          # trusted issuer bundle
ssl_verify_depth       2;

# --- Revocation check (pick ONE of the two) -----------------------------------
# Option A: OCSP (nginx >= 1.19.0). Responder URL is normally read from the
# client cert's AIA extension. Uncomment `ssl_ocsp_responder` only to override.
ssl_ocsp               on;
# ssl_ocsp_responder   http://ocsp.example.com/;

# Option B: static CRL. Replace OCSP lines above with:
# ssl_crl              /etc/nginx/ssl/user-ca.crl;

location / {
    # Clamp any inbound X-SSL-* the attacker might try to inject...
    proxy_set_header X-SSL-User   "";
    proxy_set_header X-SSL-Verify "";
    # ...then set them from nginx-verified variables only.
    proxy_set_header X-SSL-User   $captive_mtls_user;
    proxy_set_header X-SSL-Verify $ssl_client_verify;

    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Host              $http_host;
    proxy_redirect   off;
    proxy_buffering  off;

    proxy_pass http://captive_server;     # upstream to pi-custom-captive:8000
}
